{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="card-container" style="max-width:600px; text-align:center; padding:4rem 2rem;">
        <div style="font-size:5rem; font-weight:900; background:linear-gradient(135deg,#f87171,#dc2626); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height:1; margin-bottom:1rem;">500</div>
        <h2 style="font-weight:700; color:#1e293b; margin-bottom:0.5rem;">Internal Server Error</h2>
        <p style="color:#64748b; margin-bottom:2rem;">Something went wrong on our end. Please try again or go back to the home page.</p>
        <a href="{{ url_for('index') }}" class="btn-primary-custom text-decoration-none">
            <i class="fas fa-home me-2"></i>Go to Home
        </a>
    </div>
</div>
{% endblock %}
