<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizations - Internship Allocator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container-main {
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            margin-bottom: 2rem;
        }
        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .page-header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .chart-container {
            background: #f8fafc;
            border-radius: 14px;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }
        .chart-title {
            font-weight: 700;
            color: #334155;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }
        .chart-title i {
            color: #4f46e5;
            margin-right: 8px;
        }
        .btn-back {
            background: white;
            color: #4f46e5;
            border: 2px solid white;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s;
        }
        .btn-back:hover {
            background: #4f46e5;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- Header -->
        <div class="page-header">
            <h1><i class="fas fa-chart-pie me-3"></i>Visualizations</h1>
            <p>Interactive charts and analysis of allocation results</p>
            <a href="{{ url_for('results') }}" class="btn-back mt-3">
                <i class="fas fa-arrow-left me-2"></i>Back to Results
            </a>
        </div>

        <!-- Charts Grid -->
        <div class="row g-4">
            <!-- Chart 1: Score Distribution -->
            <div class="col-lg-6">
                <div class="chart-container">
                    <h6 class="chart-title">
                        <i class="fas fa-chart-bar"></i>Match Score Distribution
                    </h6>
                    <div id="chart1"></div>
                </div>
            </div>

            <!-- Chart 2: Top Companies -->
            <div class="col-lg-6">
                <div class="chart-container">
                    <h6 class="chart-title">
                        <i class="fas fa-building"></i>Top 10 Companies by Allocations
                    </h6>
                    <div id="chart2"></div>
                </div>
            </div>

            <!-- Chart 3: Feature Scores -->
            <div class="col-lg-6">
                <div class="chart-container">
                    <h6 class="chart-title">
                        <i class="fas fa-sliders-h"></i>Average Feature Scores
                    </h6>
                    <div id="chart3"></div>
                </div>
            </div>

            <!-- Chart 4: Quality Distribution -->
            <div class="col-lg-6">
                <div class="chart-container">
                    <h6 class="chart-title">
                        <i class="fas fa-chart-pie"></i>Allocation Quality Distribution
                    </h6>
                    <div id="chart4"></div>
                </div>
            </div>
        </div>

        <!-- Back button bottom -->
        <div class="text-center mt-4">
            <a href="{{ url_for('results') }}" class="btn-back">
                <i class="fas fa-arrow-left me-2"></i>Back to Results Dashboard
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Plotly config for all charts
        var config = { 
            responsive: true, 
            displayModeBar: true,
            modeBarButtonsToRemove: ['lasso2d', 'select2d'],
            displaylogo: false
        };

        // Render Chart 1
        try {
            var graph1 = {{ graph1JSON | safe }};
            Plotly.newPlot('chart1', graph1.data, graph1.layout, config);
        } catch (e) {
            console.error('Error rendering chart 1:', e);
            document.getElementById('chart1').innerHTML = '<p style="color:#ef4444; text-align:center; padding:2rem;">Error loading chart</p>';
        }

        // Render Chart 2
        try {
            var graph2 = {{ graph2JSON | safe }};
            Plotly.newPlot('chart2', graph2.data, graph2.layout, config);
        } catch (e) {
            console.error('Error rendering chart 2:', e);
            document.getElementById('chart2').innerHTML = '<p style="color:#ef4444; text-align:center; padding:2rem;">Error loading chart</p>';
        }

        // Render Chart 3
        try {
            var graph3 = {{ graph3JSON | safe }};
            Plotly.newPlot('chart3', graph3.data, graph3.layout, config);
        } catch (e) {
            console.error('Error rendering chart 3:', e);
            document.getElementById('chart3').innerHTML = '<p style="color:#ef4444; text-align:center; padding:2rem;">Error loading chart</p>';
        }

        // Render Chart 4
        try {
            var graph4 = {{ graph4JSON | safe }};
            Plotly.newPlot('chart4', graph4.data, graph4.layout, config);
        } catch (e) {
            console.error('Error rendering chart 4:', e);
            document.getElementById('chart4').innerHTML = '<p style="color:#ef4444; text-align:center; padding:2rem;">Error loading chart</p>';
        }

        // Make charts responsive on window resize
        window.addEventListener('resize', function() {
            Plotly.Plots.resize('chart1');
            Plotly.Plots.resize('chart2');
            Plotly.Plots.resize('chart3');
            Plotly.Plots.resize('chart4');
        });
    </script>
</body>
</html>
